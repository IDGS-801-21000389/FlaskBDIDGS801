{% extends "layout.html" %}
{% block container %}

<div class="max-w-4xl mx-auto mt-8 space-y-6">

    <!-- Tarjeta del alumno -->
    <div class="bg-white shadow-md rounded-xl p-6 flex items-center gap-6 border">

        <img 
        class="w-32 h-32 object-cover rounded-full border"
        src="{{ url_for('static', filename='img/user.jpg') }}" 
        alt="Alumno">

        <div>
            <h2 class="text-3xl font-bold text-gray-800">
                {{nombre}} {{apellidos}}
            </h2>

            <p class="text-gray-600 mt-2">
                📧 {{email}}
            </p>

            <p class="text-gray-600">
                📱 {{telefono}}
            </p>
        </div>

    </div>


    <!-- Cursos -->
    <div class="bg-white shadow-md rounded-xl p-6 border">

        <h3 class="text-2xl font-semibold text-gray-800 mb-4">
            Cursos inscritos
        </h3>

        {% if cursos %}

        <div class="grid md:grid-cols-2 gap-4">

            {% for curso in cursos %}
            <div class="p-4 border rounded-lg hover:shadow-lg transition bg-gray-50">

                <h4 class="text-xl font-semibold text-gray-800">
                    📚 {{ curso.nombre }}
                </h4>

            </div>
            {% endfor %}

        </div>

        {% else %}

        <p class="text-gray-500">
            Este alumno no está inscrito en ningún curso.
        </p>

        {% endif %}

    </div>

</div>

{% endblock %}
